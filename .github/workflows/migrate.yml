name: Run Supabase Migrations

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Taper "oui" pour confirmer'
        required: true
        default: ''

env:
  PGHOST: db.elhppzgvnysidywkuxuu.supabase.co
  PGUSER: postgres
  PGDATABASE: postgres
  PGPORT: 5432
  PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

jobs:
  migrate:
    name: Exécuter les migrations SQL
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'oui' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install psql
        run: sudo apt-get install -y postgresql-client

      - name: Run 001_init
        run: psql -f supabase/migrations/001_init.sql

      - name: Run 002_feedback
        run: psql -f supabase/migrations/002_feedback.sql

      - name: Run 003_core_refactor
        run: psql -f supabase/migrations/003_core_refactor.sql
        continue-on-error: true

      - name: Run 004_rate_limiting
        run: psql -f supabase/migrations/004_rate_limiting.sql

      - name: Verify tables
        run: |
          psql -c "\dt"
          psql -c "\df try_increment_usage"
