name: Run Supabase Migrations

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Taper "oui" pour confirmer'
        required: true
        default: ''

jobs:
  migrate:
    name: Exécuter les migrations SQL
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'oui' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install psql
        run: sudo apt-get install -y postgresql-client

      - name: Run 001_init
        run: psql "${{ secrets.SUPABASE_DB_URL }}" -f supabase/migrations/001_init.sql
        continue-on-error: false

      - name: Run 002_feedback
        run: psql "${{ secrets.SUPABASE_DB_URL }}" -f supabase/migrations/002_feedback.sql
        continue-on-error: false

      - name: Run 003_core_refactor
        run: psql "${{ secrets.SUPABASE_DB_URL }}" -f supabase/migrations/003_core_refactor.sql
        continue-on-error: true

      - name: Run 004_rate_limiting
        run: psql "${{ secrets.SUPABASE_DB_URL }}" -f supabase/migrations/004_rate_limiting.sql
        continue-on-error: false

      - name: Verify tables
        run: |
          psql "${{ secrets.SUPABASE_DB_URL }}" -c "\dt"
          psql "${{ secrets.SUPABASE_DB_URL }}" -c "\df try_increment_usage"
